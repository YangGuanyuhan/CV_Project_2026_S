# Grounding DINO Configuration

# Model settings
model:
  name: grounding_dino
  backbone:
    type: swin_tiny
    pretrained: true
    checkpoint: checkpoints/swin_tiny_patch4_window7_224.pth
    window_size: 7
    embed_dim: 96
    depths: [2, 2, 6, 2]
    num_heads: [3, 6, 12, 24]

  language:
    type: bert
    model_name: bert-base-uncased
    hidden_size: 768
    max_text_len: 256

  fusion:
    type: deformable_attention
    d_model: 256
    nhead: 8
    num_layers: 6
    dim_feedforward: 1024

  # Detection head
  num_queries: 900
  num_classes: 80  # COCO classes

# Dataset settings
dataset:
  name: coco
  data_dir: data/
  train_set: train2017
  val_set: val2017
  img_size: 800
  max_size: 1333

  transforms:
    train:
      - type: RandomHorizontalFlip
        prob: 0.5
      - type: RandomResize
        sizes: [800, 864, 928, 992, 1056, 1120, 1184, 1248, 1312]
      - type: Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]

    val:
      - type: RandomResize
        sizes: [800]
      - type: Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]

# Training settings
training:
  output_dir: outputs/
  epochs: 12
  batch_size: 2
  num_workers: 4

  optimizer:
    type: AdamW
    lr: 0.0001
    weight_decay: 0.0001
    betas: [0.9, 0.999]

  scheduler:
    type: MultiStepLR
    milestones: [8, 11]
    gamma: 0.1

  # Mixed precision
  fp16: true

  # Gradient clipping
  max_grad_norm: 0.1

  # Logging
  log_interval: 50
  save_interval: 1

  # Checkpoint
  resume: null
  pretrained: null

# Evaluation settings
evaluation:
  eval_period: 1
  metric: map
  iou_threshold: 0.5
