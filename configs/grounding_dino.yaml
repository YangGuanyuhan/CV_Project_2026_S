# Grounding DINO Configuration

# Model settings
model:
  name: grounding_dino
  backbone:
    type: swin_tiny
    pretrained: true
    checkpoint: checkpoints/swin_tiny_patch4_window7_224.pth
    window_size: 7
    embed_dim: 96
    depths: [2, 2, 6, 2]
    num_heads: [3, 6, 12, 24]

  language:
    type: bert
    model_name: bert-base-uncased
    hidden_size: 768
    max_text_len: 256

  fusion:
    type: deformable_attention
    d_model: 256
    nhead: 8
    num_layers: 6
    dim_feedforward: 1024

  # Detection head
  num_queries: 900
  num_classes: 80  # COCO classes

# Dataset settings
dataset:
  name: coco
  data_dir: data/
  train_set: train2017
  val_set: val2017
  img_size: 800
  max_size: 1333

  transforms:
    train:
      - type: RandomHorizontalFlip
        prob: 0.5
      - type: RandomResize
        sizes: [800, 864, 928, 992, 1056, 1120, 1184, 1248, 1312]
      - type: Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]

    val:
      - type: RandomResize
        sizes: [800]
      - type: Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]

# Training settings
training:
  output_dir: outputs/
  epochs: 12
  batch_size: 2
  num_workers: 4

  optimizer:
    type: AdamW
    lr: 0.0001
    weight_decay: 0.0001
    betas: [0.9, 0.999]

  scheduler:
    type: MultiStepLR
    milestones: [8, 11]
    gamma: 0.1

  # Mixed precision
  fp16: true

  # Gradient clipping
  max_grad_norm: 0.1

  # Logging
  log_interval: 50
  save_interval: 1

  # Checkpoint
  resume: null
  pretrained: null

# Evaluation settings
evaluation:
  eval_period: 1
  metric: map
  iou_threshold: 0.5

# Grounding DINO specific settings
grounding_dino:
  # Official model config and checkpoint paths
  model_config: groundingdino/config/GroundingDINO_SwinT_OGC.py
  checkpoint: checkpoints/groundingdino_swint_ogc.pth

  # Inference thresholds
  box_threshold: 0.35
  text_threshold: 0.25

  # Text prompt (COCO 80 classes, dot-separated)
  text_prompt: "person . bicycle . car . motorcycle . airplane . bus . train . truck . boat . traffic light . fire hydrant . stop sign . parking meter . bench . bird . cat . dog . horse . sheep . cow . elephant . bear . zebra . giraffe . backpack . umbrella . handbag . tie . suitcase . frisbee . skis . snowboard . sports ball . kite . baseball bat . baseball glove . skateboard . surfboard . tennis racket . bottle . wine glass . cup . fork . knife . spoon . bowl . banana . apple . sandwich . orange . broccoli . carrot . hot dog . pizza . donut . cake . chair . couch . potted plant . bed . dining table . toilet . tv . laptop . mouse . remote . keyboard . cell phone . microwave . oven . toaster . sink . refrigerator . book . clock . vase . scissors . teddy bear . hair drier . toothbrush ."

  # COCO evaluation paths
  coco_image_dir: data/coco/val2017
  coco_ann_file: data/coco/annotations/instances_val2017.json

  # Subset evaluation (set to null for full evaluation)
  subset_size: null
